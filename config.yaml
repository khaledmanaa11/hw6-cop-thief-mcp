grid_size: [5, 5]
max_moves: 25
num_games: 6
max_barriers: 5
scoring:
  cop_win: 20
  thief_win: 10
  cop_loss: 5
  thief_loss: 5
servers:
  cop:
    host: "127.0.0.1"
    port: 8001
  thief:
    host: "127.0.0.1"
    port: 8002
output:
  run_dir: "runs"
strategy:
  cop: minimax
  thief: minimax
  minimax:
    depth: 4
    weights:
      dist: 1.0
      thief_mob: 0.3
      corner: 0.2
      reach: 0.15
      capture: 1000.0
  qtable:
    path: "models/qtable.json"
    train:
      episodes: 20000
      alpha: 0.3
      gamma: 0.95
      epsilon: 0.2
      seed: 7
agents:
  cop: llm
  thief: llm
  llm:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 1024
    temperature: 0.7
    veto_margin: 50.0
observation:
  mode: noisy
  noisy:
    reveal_radius: 2
    quadrant_hint: true
gui:
  host: "127.0.0.1"
  port: 8000
  run_dir: "runs"
report:
  enabled: false        # flip to true + run `python -m src.reporting auth` once for the live send
  to: "rmisegal+uoh26b@gmail.com"
  subject: "HW6 Cop&Thief MCP series report"
  credentials_path: "secrets/gmail_credentials.json"   # OAuth client secret (Google Cloud Console)
  token_path: "secrets/gmail_token.json"               # refresh token (one-time login)
